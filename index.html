<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VLC Engineering Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="header-nav">
        <h1>VLC Dashboard</h1>
        <a href="chat.html" class="nav-link">Switch to Chat Mode 💬</a>
    </div>

    <div class="tabs">
        <div id="tab-tx" class="tab active" onclick="switchTab('tx')">Transmitter (TX)</div>
        <div id="tab-rx" class="tab" onclick="switchTab('rx')">Receiver (RX)</div>
    </div>

    <div id="panel-tx" class="panel active">
        <div style="margin-bottom: 15px;">
            <button class="btn" id="btn-conn-tx" onclick="connectBLE('TX')">Connect to Transmitter</button>
            <button class="btn disconnect" id="btn-disc-tx" onclick="disconnectBLE('TX')">Disconnect</button>
            <span id="status-tx" style="margin-left:10px; color:#888;">Status: Disconnected</span>
        </div>
        
        <textarea id="tx-input" placeholder="Type your payload here..."></textarea>
        <button class="btn" onclick="dashboardSendMessage()">Send Data</button>

        <h3 style="color:var(--accent); border-bottom:1px solid #333; padding-bottom:5px;">TX Console</h3>
        <div class="console" id="console-tx"></div>
        <button class="btn" style="margin-top: 10px;" onclick="clearConsole('console-tx')">Clear Screen</button>
    </div>

    <div id="panel-rx" class="panel">
        <div style="margin-bottom: 15px;">
            <button class="btn" id="btn-conn-rx" onclick="connectBLE('RX')">Connect to Receiver</button>
            <button class="btn disconnect" id="btn-disc-rx" onclick="disconnectBLE('RX')">Disconnect</button>
            <span id="status-rx" style="margin-left:10px; color:#888;">Status: Disconnected</span>
        </div>

        <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 15px; background: #000; padding: 10px; border: 1px solid var(--border); border-radius: 4px;">
            <label for="rx-mode-select"><strong>Print Mode:</strong></label>
            <select id="rx-mode-select" onchange="changeRxMode()" disabled style="background: var(--panel-bg); color: var(--text-main); border: 1px solid var(--border); padding: 8px; border-radius: 4px;">
                <option value="MODE:COMPLETE" selected>Complete Message</option>
                <option value="MODE:LETTER">Letter-by-Letter</option>
            </select>
        </div>

        <h3 style="color:var(--accent); border-bottom:1px solid #333; padding-bottom:5px;">RX Console</h3>
        <div class="console" id="console-rx"></div>
        <button class="btn" style="margin-top: 10px;" onclick="clearConsole('console-rx')">Clear Screen</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
