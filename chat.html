<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VLC Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="chat-body">

<div class="wa-app-container">
    <div class="wa-header">
        <div class="wa-header-left">
            <a href="index.html" class="wa-back-btn">❮</a>
            <div class="wa-avatar"></div>
            <div class="wa-contact-info">
                <div class="wa-contact-name">VLC Secure Link</div>
                <div class="wa-contact-status" id="wa-status-text">TX: 🔴 | RX: 🔴</div>
            </div>
        </div>
        <div class="wa-header-right">
            <button class="wa-icon-btn" onclick="connectBLE('TX')" title="Pair Transmitter">📡↑</button>
            <button class="wa-icon-btn" onclick="connectBLE('RX')" title="Pair Receiver">📡↓</button>
        </div>
    </div>

    <div class="wa-chat-window" id="chat-window">
        <div class="wa-encryption-notice">
            🔒 Messages are optically encrypted end-to-end via Visible Light Communication.
        </div>
        </div>

    <div class="wa-footer">
        <input type="file" id="image-input" accept="image/*" style="display: none;" onchange="sendImage()">
        
        <button class="wa-icon-btn" onclick="document.getElementById('image-input').click()" title="Send Image" style="background: none; border: none; font-size: 24px; cursor: pointer; padding-right: 10px;">
            📷
        </button>

        <input type="text" id="chat-input" class="wa-input" placeholder="Type a message" autocomplete="off">
        
        <button class="wa-send-btn" onclick="sendChatMessage()">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                <path d="M1.101 21.757 23.8 12.028 1.101 2.3l.011 7.912 13.623 1.816-13.623 1.817-.011 7.912z"></path>
            </svg>
        </button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
